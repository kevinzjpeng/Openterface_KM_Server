name: Start Ephemeral Server

# Trigger manually from the GitHub Actions UI (Actions → "Start Ephemeral Server" → Run workflow)
on:
  workflow_dispatch:
    inputs:
      duration_minutes:
        description: "How long to keep the server alive (minutes, max 60)"
        required: false
        default: "10"
      tunnel_type:
        description: "Which reverse proxy to use"
        required: false
        default: "cloudflare"
        type: choice
        options:
          - cloudflare
          - frp

jobs:
  serve:
    name: Run WebSocket server via reverse proxy tunnel
    runs-on: ubuntu-latest
    timeout-minutes: 65
    permissions:
      contents: write  # needed for checkout + writing tunnel URL file   # hard cap — keep above maximum allowed duration_minutes

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Python environment
      # -----------------------------------------------------------------------
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # -----------------------------------------------------------------------
      # 3. Install cloudflared  (official .deb from GitHub Releases)
      # -----------------------------------------------------------------------
      - name: Install cloudflared
        run: |
          set -eux
          # Use /latest/download/ redirect — no API call needed, avoids rate limits
          curl -fsSL \
            "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb" \
            -o /tmp/cloudflared.deb
          sudo dpkg -i /tmp/cloudflared.deb
          cloudflared --version

      # -----------------------------------------------------------------------
      # 3b. Install FRP client (fallback tunnel solution - optional)
      # -----------------------------------------------------------------------
      # To use FRP as fallback, set these GitHub Secrets:
      #   FRP_SERVER_ADDR    - FRP server address (e.g., frp.example.com:7000)
      #   FRP_TOKEN          - FRP token/password
      # Uncomment the following section if you have FRP configured:
      #
      # - name: Install FRP client
      #   if: env.FRP_SERVER_ADDR != ''
      #   run: |
      #     wget https://github.com/fatedier/frp/releases/download/v0.55.1/frp_0.55.1_linux_amd64.tar.gz
      #     tar xzf frp_0.55.1_linux_amd64.tar.gz
      #     mv frp_0.55.1_linux_amd64/frpc /usr/local/bin/

      # -----------------------------------------------------------------------
      # 4. Start uvicorn server in background
      # -----------------------------------------------------------------------
      - name: Start uvicorn server
        env:
          SESSION_DURATION_MINUTES: ${{ github.event.inputs.duration_minutes }}
        run: |
          nohup uvicorn server:app --host 127.0.0.1 --port 8765 \
            > /tmp/uvicorn.log 2>&1 &
          echo "Waiting for uvicorn to be ready …"
          for i in $(seq 1 15); do
            if curl -sf http://127.0.0.1:8765/ > /dev/null 2>&1; then
              echo "uvicorn is up."
              break
            fi
            sleep 1
          done

      # -----------------------------------------------------------------------
      # 5. Start selected reverse proxy tunnel
      # -----------------------------------------------------------------------
      - name: Start tunnel (Cloudflare)
        if: github.event.inputs.tunnel_type == 'cloudflare' || github.event.inputs.tunnel_type == ''
        run: |
          echo "Starting Cloudflare tunnel..."
          nohup cloudflared tunnel --url http://127.0.0.1:8765 \
            > /tmp/cf.log 2>&1 &
          CF_PID=$!
          
          PUBLIC_URL=""
          for i in $(seq 1 40); do
            sleep 3
            PUBLIC_URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' /tmp/cf.log | head -1)
            if [ -n "$PUBLIC_URL" ]; then
              echo "✓ Cloudflare tunnel started successfully"
              echo "$PUBLIC_URL" > /tmp/tunnel_url.txt
              echo "Cloudflare" > /tmp/tunnel_type.txt
              break
            fi
          done

          if [ -z "$PUBLIC_URL" ]; then
            echo "ERROR: Cloudflare tunnel failed to start"
            cat /tmp/cf.log
            exit 1
          fi

      - name: Start tunnel (FRP)
        if: github.event.inputs.tunnel_type == 'frp'
        run: |
          # FRP Configuration from GitHub Secrets
          FRP_SERVER_ADDR="${{ secrets.FRP_SERVER_ADDR }}"
          FRP_TOKEN="${{ secrets.FRP_TOKEN }}"
          FRP_DOMAIN="${{ secrets.FRP_DOMAIN }}"
          
          if [ -z "$FRP_SERVER_ADDR" ] || [ -z "$FRP_TOKEN" ]; then
            echo "ERROR: FRP_SERVER_ADDR and FRP_TOKEN secrets must be configured"
            echo "Please add these GitHub Secrets to your repository:"
            echo "  FRP_SERVER_ADDR - FRP server address (e.g., frp.example.com:7000)"
            echo "  FRP_TOKEN       - FRP authentication token"
            echo "  FRP_DOMAIN      - Domain or subdomain for the tunnel (e.g., km.example.com)"
            exit 1
          fi
          
          echo "Starting FRP tunnel..."
          
          # Create FRP client config
          cat > /tmp/frpc.ini << EOF
          [common]
          server_addr = ${FRP_SERVER_ADDR%:*}
          server_port = ${FRP_SERVER_ADDR#*:}
          token = $FRP_TOKEN
          
          [km-server]
          type = http
          local_ip = 127.0.0.1
          local_port = 8765
          custom_domains = $FRP_DOMAIN
          EOF
          
          # Download and start FRP if not already installed
          if ! command -v frpc &> /dev/null; then
            echo "Installing FRP client..."
            wget -q https://github.com/fatedier/frp/releases/download/v0.55.1/frp_0.55.1_linux_amd64.tar.gz
            tar xzf frp_0.55.1_linux_amd64.tar.gz
            mv frp_0.55.1_linux_amd64/frpc /usr/local/bin/
          fi
          
          nohup frpc -c /tmp/frpc.ini > /tmp/frpc.log 2>&1 &
          FRPC_PID=$!
          
          PUBLIC_URL=""
          for i in $(seq 1 40); do
            sleep 3
            # Check if FRP is running and has bound the domain
            if grep -q "successfully" /tmp/frpc.log; then
              PUBLIC_URL="https://${FRP_DOMAIN}"
              echo "✓ FRP tunnel started successfully"
              echo "$PUBLIC_URL" > /tmp/tunnel_url.txt
              echo "FRP" > /tmp/tunnel_type.txt
              break
            fi
          done

          if [ -z "$PUBLIC_URL" ]; then
            echo "ERROR: FRP tunnel failed to start"
            cat /tmp/frpc.log
            exit 1
          fi

      # -----------------------------------------------------------------------
      # 5b. Store tunnel URL in GitHub Actions variables (secure, no git history)
      # -----------------------------------------------------------------------
      - name: Save tunnel info to GitHub Actions variables
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PUBLIC_URL=$(cat /tmp/tunnel_url.txt)
          TUNNEL_TYPE=$(cat /tmp/tunnel_type.txt)
          
          echo "::notice title=TunnelURL::$PUBLIC_URL (via $TUNNEL_TYPE)"
          
          # Store in GitHub Actions repository variables (secure, no git history)
          gh variable set KEYMOD_TUNNEL_URL "$PUBLIC_URL" --repo "$GITHUB_REPOSITORY"
          gh variable set KEYMOD_TUNNEL_TYPE "$TUNNEL_TYPE" --repo "$GITHUB_REPOSITORY"
          
          echo "Tunnel info stored in GitHub Actions variables:"
          echo "  KEYMOD_TUNNEL_URL  = $PUBLIC_URL"
          echo "  KEYMOD_TUNNEL_TYPE = $TUNNEL_TYPE"
          echo ""
          echo "============================================================"
          echo "  TUNNEL TYPE     : $TUNNEL_TYPE"
          echo "  PUBLIC HTTP URL : $PUBLIC_URL"
          echo "  PUBLIC WSS URL  : ${PUBLIC_URL/https:/wss:}/ws"
          echo "  Health-check    : curl $PUBLIC_URL/status"
          echo "  Agent command   : python3 agent.py ${PUBLIC_URL/https:/wss:}"
          echo "============================================================"
          echo ""


      # -----------------------------------------------------------------------
      # 6. Keep runner alive for the requested number of minutes
      # -----------------------------------------------------------------------
      - name: Keep server alive
        run: |
          DURATION="${{ github.event.inputs.duration_minutes }}"
          # Clamp to [1, 60]
          DURATION=$(( DURATION < 1 ? 1 : (DURATION > 60 ? 60 : DURATION) ))
          SECONDS_LEFT=$(( DURATION * 60 ))
          echo "Server will stay alive for ${DURATION} minute(s) (${SECONDS_LEFT}s)."
          echo "Send Ctrl-C from the GitHub Actions UI (cancel the job) to stop early."
          sleep "$SECONDS_LEFT"

      # -----------------------------------------------------------------------
      # 7. Show server logs on completion (useful for debugging)
      # -----------------------------------------------------------------------
      - name: Dump server logs
        if: always()
        run: |
          echo "=== uvicorn log ==="
          cat /tmp/uvicorn.log || true
          echo ""
          echo "=== cloudflared log ==="
          cat /tmp/cf.log || true
          echo ""
          echo "=== frpc log ==="
          cat /tmp/frpc.log || true
